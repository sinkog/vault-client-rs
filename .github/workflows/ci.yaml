# SPDX-License-Identifier: MIT OR Apache-2.0

name: CI

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/ci.yaml"
      - ".config/nextest.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "deny.toml"
      - "rust-toolchain.toml"
  pull_request: {}

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    strategy:
      matrix:
        rust-version: [stable, beta]
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}
          components: rustfmt, clippy

      - name: Lint (clippy)
        run: cargo clippy --all-features --workspace

      - name: Lint (rustfmt)
        run: cargo fmt --all --check

  test:
    name: Test
    strategy:
      matrix:
        # Vault versions the client is tested against. Renovate watches the
        # highest entry (see renovate.json) and opens a PR when a newer Vault is
        # released — the bump is then verified locally before merging.
        # renovate: datasource=docker depName=hashicorp/vault versioning=docker
        vault-version: ["1.18", "2.0"]
        rust-version: [stable, beta]
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}

    services:
      vault:
        image: hashicorp/vault:${{ matrix.vault-version }}
        # Vault 2.0 dev containers need capability support to start.
        options: --cap-add IPC_LOCK
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: myroot
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

    env:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: myroot

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}

      - uses: taiki-e/install-action@nextest

      - name: Wait for Vault to become ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8200/v1/sys/health; then
              echo "Vault is ready"
              exit 0
            fi
            echo "Waiting for Vault... ($i/30)"
            sleep 1
          done
          echo "Vault failed to start. Container logs:"
          docker logs ${{ job.services.vault.id }}
          exit 1

      - name: Run all tests
        run: RUST_BACKTRACE=1 cargo nextest run --all-features --workspace --no-fail-fast

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo generate-lockfile
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04

    services:
      vault:
        image: hashicorp/vault:1.18
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: myroot
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

    env:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: myroot

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest

      - name: Wait for Vault to become ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8200/v1/sys/health; then
              echo "Vault is ready"
              exit 0
            fi
            echo "Waiting for Vault... ($i/30)"
            sleep 1
          done
          echo "Vault failed to start. Container logs:"
          docker logs ${{ job.services.vault.id }}
          exit 1

      # Line-coverage quality gate. The blocking mirror (a mechanical
      # sync-over-async copy of the async API) and sys/mod.rs trait-delegation
      # boilerplate are excluded; the remaining, meaningful code must stay at or
      # above 90% lines. Keep the regex and floor in sync with the Makefile.
      - name: Coverage (fail under 90% lines)
        run: |
          cargo llvm-cov nextest --all-features --workspace \
            --ignore-filename-regex '(blocking/mod\.rs|client/blocking_client\.rs|api/sys/mod\.rs)' \
            --fail-under-lines 90

  mutation:
    name: Mutation (cargo-mutants)
    # Mutation testing is too slow for every push — gate it on PRs only, like
    # the coverage floor it complements. Scoped to the logic-bearing modules
    # (kept in sync with the Makefile's MUTANTS_FILES); the integration binary
    # is excluded so no Vault service is needed.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      # cargo-mutants builds mutated copies of the crate; a mutation can trip an
      # otherwise-harmless warning, so don't let -D warnings turn those caught
      # mutants into "unviable" build failures.
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants,nextest

      - name: Mutation — circuit_breaker + error (no surviving mutants)
        run: |
          cargo mutants --no-shuffle --all-features --test-tool nextest \
            -f crates/vault-client-rs/src/circuit_breaker.rs \
            -f crates/vault-client-rs/src/types/error.rs \
            -- -E 'not binary(integration)'

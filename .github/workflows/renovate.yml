# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Self-hosted Renovate for this fork — updates Rust (cargo) dependencies and
# opens PRs, without needing the hosted Renovate GitHub App installed. Config
# lives in renovate.json. Runs weekly and on demand.
#
# Note: it authenticates with the default GITHUB_TOKEN, which is enough to open
# dependency PRs but cannot itself re-trigger other workflows on those PRs. If
# you want CI to run on Renovate's PRs, swap in a fine-grained PAT stored as the
# RENOVATE_TOKEN secret and reference it below.
name: Renovate

on:
  schedule:
    - cron: "0 5 * * 1" # weekly, Monday 05:00 UTC
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v40.3.6
        with:
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
